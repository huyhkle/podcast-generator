<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Podcast Generator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0C0C0F;
      color: #E8E4DC;
      font-family: 'Georgia', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    .container {
      width: 100%;
      max-width: 680px;
    }

    .header {
      margin-bottom: 40px;
      border-bottom: 1px solid #1E1E25;
      padding-bottom: 24px;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #C8A96E;
      box-shadow: 0 0 10px #C8A96E;
      display: inline-block;
      margin-right: 10px;
    }

    .label {
      font-size: 11px;
      letter-spacing: 3px;
      color: #555;
      font-family: monospace;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 32px;
      font-weight: normal;
      letter-spacing: 2px;
      color: #E8E4DC;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 13px;
      color: #555;
      letter-spacing: 1px;
    }

    .card {
      background: #111115;
      border: 1px solid #1E1E25;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .card-title {
      font-size: 11px;
      letter-spacing: 2px;
      color: #555;
      font-family: monospace;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
    }

    .option {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #1E1E25;
      transition: border-color 0.2s;
    }

    .option:hover { border-color: #C8A96E44; }
    .option.selected { border-color: #C8A96E55; background: #1A1A10; }

    .option input { accent-color: #C8A96E; }

    .option-text {
      font-size: 13px;
      color: #9E9E9E;
    }

    .option.selected .option-text { color: #E8E4DC; }

    .btn-generate {
      width: 100%;
      padding: 16px;
      background: #C8A96E;
      border: none;
      border-radius: 10px;
      color: #0C0C0F;
      font-size: 15px;
      font-family: 'Georgia', serif;
      letter-spacing: 1px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 0 20px #C8A96E33;
    }

    .btn-generate:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 0 30px #C8A96E55;
    }

    .btn-generate:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .status {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      background: #0F0F13;
      border: 1px solid #1E1E25;
      border-radius: 8px;
      margin-top: 16px;
      font-size: 13px;
      color: #666;
      font-family: monospace;
    }

    .status.show { display: flex; }

    .spinner {
      width: 14px; height: 14px;
      border: 2px solid #333;
      border-top-color: #C8A96E;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .result { display: none; }
    .result.show { display: block; }

    .script-box {
      background: #0A0A0D;
      border: 1px solid #1E1E25;
      border-radius: 8px;
      padding: 20px;
      font-size: 13px;
      line-height: 1.8;
      color: #9E9E9E;
      white-space: pre-wrap;
      max-height: 400px;
      overflow-y: auto;
      margin-bottom: 16px;
      font-family: monospace;
    }

    .script-box::-webkit-scrollbar { width: 4px; }
    .script-box::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .btn-copy {
      width: 100%;
      padding: 14px;
      background: none;
      border: 1px solid #C8A96E;
      border-radius: 10px;
      color: #C8A96E;
      font-size: 14px;
      font-family: 'Georgia', serif;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 12px;
    }

    .btn-copy:hover { background: #C8A96E11; }
    .btn-copy.copied { border-color: #5CE09A; color: #5CE09A; }

    .instruction {
      font-size: 12px;
      color: #444;
      text-align: center;
      line-height: 1.6;
      font-family: monospace;
    }

    .instruction a { color: #C8A96E; text-decoration: none; }

    .error {
      display: none;
      padding: 14px 16px;
      background: #1A0A0A;
      border: 1px solid #E05C5C33;
      border-radius: 8px;
      color: #E05C5C;
      font-size: 13px;
      margin-top: 16px;
      font-family: monospace;
    }

    .error.show { display: block; }

    .date-badge {
      display: inline-block;
      padding: 4px 10px;
      background: #1A1A10;
      border: 1px solid #C8A96E33;
      border-radius: 20px;
      font-size: 11px;
      color: #C8A96E;
      font-family: monospace;
      margin-bottom: 20px;
    }

    .steps {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    .step {
      flex: 1;
      padding: 8px;
      background: #0A0A0D;
      border-radius: 6px;
      text-align: center;
      font-size: 11px;
      color: #444;
      font-family: monospace;
      line-height: 1.4;
    }

    .step.active { color: #C8A96E; background: #1A1A10; }
    .step.done { color: #5CE09A; background: #0A1A0F; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="label">
        <span class="dot"></span>
        Podcast Generator · Powered by Claude
      </div>
      <h1>THẾ GIỚI HÔM NAY</h1>
      <p class="subtitle">Tự động tạo script podcast tin tức mỗi ngày</p>
    </div>

    <div class="card">
      <div class="card-title">Cài đặt</div>
      <div id="dateBadge" class="date-badge"></div>

      <div class="options">
        <label class="option selected">
          <input type="radio" name="focus" value="balanced" checked />
          <span class="option-text">⚖️ &nbsp;Cân bằng — Thế giới + Việt Nam</span>
        </label>
        <label class="option">
          <input type="radio" name="focus" value="vietnam" />
          <span class="option-text">🇻🇳 &nbsp;Tập trung Việt Nam & Kinh tế</span>
        </label>
        <label class="option">
          <input type="radio" name="focus" value="global" />
          <span class="option-text">🌏 &nbsp;Tập trung Địa chính trị Toàn cầu</span>
        </label>
      </div>

      <button class="btn-generate" id="btnGenerate" onclick="generate()">
        ▶ &nbsp;Generate Script Hôm Nay
      </button>

      <div class="status" id="status">
        <div class="spinner"></div>
        <span id="statusText">Đang tạo script...</span>
      </div>

      <div class="steps" id="steps" style="display:none">
        <div class="step" id="step1">✍️<br/>Viết script</div>
        <div class="step" id="step2">📝<br/>Xử lý</div>
        <div class="step" id="step3">✅<br/>Hoàn tất</div>
      </div>

      <div class="error" id="error"></div>
    </div>

    <div class="card result" id="result">
      <div class="card-title">Script đã sẵn sàng</div>
      <div class="script-box" id="scriptBox"></div>
      <button class="btn-copy" id="btnCopy" onclick="copyScript()">
        📋 &nbsp;Copy toàn bộ script
      </button>
      <div class="instruction">
        Sau khi copy → mở
        <a href="https://notebooklm.google.com" target="_blank">notebooklm.google.com</a>
        → New Notebook → Add Source → Paste Text → Audio Overview
      </div>
    </div>
  </div>

  <script>
    const today = new Date();
    const dateStr = today.toLocaleDateString('vi-VN', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });
    document.getElementById('dateBadge').textContent = dateStr;

    document.querySelectorAll('input[name="focus"]').forEach(radio => {
      radio.addEventListener('change', () => {
        document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
        radio.closest('.option').classList.add('selected');
      });
    });

    let scriptContent = '';

    async function generate() {
      const btn = document.getElementById('btnGenerate');
      const status = document.getElementById('status');
      const statusText = document.getElementById('statusText');
      const error = document.getElementById('error');
      const result = document.getElementById('result');
      const steps = document.getElementById('steps');

      const focus = document.querySelector('input[name="focus"]:checked').value;

      btn.disabled = true;
      status.classList.add('show');
      error.classList.remove('show');
      result.classList.remove('show');
      steps.style.display = 'flex';

      document.getElementById('step1').classList.add('active');
      statusText.textContent = 'Đang viết script podcast...';

      try {
        const response = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ focus, date: dateStr })
        });

        document.getElementById('step1').classList.remove('active');
        document.getElementById('step1').classList.add('done');
        document.getElementById('step2').classList.add('active');
        statusText.textContent = 'Đang xử lý kết quả...';

        if (!response.ok) {
          const err = await response.json();
          throw new Error(err.error || 'Lỗi server');
        }

        const data = await response.json();
        scriptContent = data.script;

        document.getElementById('step2').classList.remove('active');
        document.getElementById('step2').classList.add('done');
        document.getElementById('step3').classList.add('done');
        statusText.textContent = 'Hoàn tất!';

        document.getElementById('scriptBox').textContent = scriptContent;
        result.classList.add('show');
        status.classList.remove('show');

      } catch (err) {
        status.classList.remove('show');
        error.classList.add('show');
        error.textContent = '❌ Lỗi: ' + err.message;
        steps.style.display = 'none';
      }

      btn.disabled = false;
    }

    function copyScript() {
      navigator.clipboard.writeText(scriptContent).then(() => {
        const btn = document.getElementById('btnCopy');
        btn.textContent = '✅  Đã copy! Mở NotebookLM để paste';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = '📋  Copy toàn bộ script';
          btn.classList.remove('copied');
        }, 3000);
      });
    }
  </script>
</body>
</html>
